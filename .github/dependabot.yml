version: 2
updates:
  - package-ecosystem: npm
    directories:
      - '/'
      - '/packages/*'
    schedule:
      interval: weekly
    groups:
      # One PR for all minor/patch bumps keeps the noise down; majors
      # still arrive as individual PRs.
      minor-and-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
