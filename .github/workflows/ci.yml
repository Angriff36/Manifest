name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # This repo is pnpm (pnpm-lock.yaml + per-package node_modules under
      # packages/*). The previous CI used `npm ci` which failed because there
      # is no package-lock.json. Mirror release.yml so install actually works.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm-lock.yaml is lockfileVersion 9 (pnpm 9.x family).
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install root dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install packages/cli dependencies (frozen lockfile)
        # packages/cli is its own pnpm project (separate pnpm-lock.yaml),
        # not a workspace member of the root. Tests in root pull from
        # packages/cli/src/**, so its transitive deps must also be installed.
        working-directory: packages/cli
        run: pnpm install --frozen-lockfile

      - name: Build root library
        # packages/cli depends on @angriff36/manifest via type imports
        # (src/checks/runtime-smoke.ts, src/commands/*.ts). Without
        # build:lib first, the CLI build below cannot resolve those modules.
        # Matches the prepublishOnly script.
        run: pnpm run build:lib

      - name: Build CLI dist
        # enforce-surface.cli.test.ts spawns the built CLI to verify
        # commander registration. Without a fresh build, CI runs the
        # checked-in dist which lags behind source on every PR.
        working-directory: packages/cli
        run: pnpm build

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        # TODO: lint debt — ~114 pre-existing errors in real source files
        # (packages/cli/src/**, src/manifest/**). Tracked as separate cleanup;
        # marked continue-on-error so the signal stays visible in CI logs
        # without blocking merges on debt unrelated to a given PR.
        continue-on-error: true
        run: pnpm run lint

      - name: Documentation integrity checks
        # TODO: docs:check references scripts/check-doc-metadata.mjs and
        # scripts/check-doc-links.mjs which currently do not exist (WIP
        # alongside scripts/docs-sync.mjs and the new docs-site/ tree).
        # Re-enable as a blocking step once those scripts ship.
        continue-on-error: true
        run: pnpm run docs:check

      - name: Run test suite
        run: pnpm test
