name: Loop dogfood (scoreboard)

# NOT the real Daily Triage agent loop. Real triage = Claude Code cron →
# scripts/loop-tick.sh (GLM/MiniMax) → STATE.md; Cursor brain watches.
# This workflow only records loop-audit + CI health into loop-run-log.md.

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Record run start
        id: timing
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run loop-audit
        id: audit
        run: |
          npx --yes @cobusgreyling/loop-audit . --json > /tmp/audit.json
          SCORE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/audit.json','utf8')).score)")
          LEVEL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/audit.json','utf8')).level)")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Check CI workflow health
        id: workflows
        run: |
          FAILING=0
          STATUS=$(gh run list --workflow="ci.yml" --limit 1 --json conclusion -q '.[0].conclusion' 2>/dev/null || echo "unknown")
          echo "ci.yml: ${STATUS}"
          if [ "$STATUS" = "failure" ]; then FAILING=1; fi
          echo "failing=$FAILING" >> "$GITHUB_OUTPUT"
          echo "ci_status=$STATUS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Append dogfood entry to loop-run-log.md (never rewrite STATE.md)
        id: runlog
        run: |
          START="${{ steps.timing.outputs.started_at }}"
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DURATION=$(node -e "
            const s = new Date('${START}').getTime();
            const e = new Date('${END}').getTime();
            console.log(Math.max(1, Math.round((e - s) / 1000)));
          ")
          FAILING="${{ steps.workflows.outputs.failing }}"
          SCORE="${{ steps.audit.outputs.score }}"
          LEVEL="${{ steps.audit.outputs.level }}"
          CI_STATUS="${{ steps.workflows.outputs.ci_status }}"
          if [ "$FAILING" -gt 0 ]; then OUTCOME="ci-red"; else OUTCOME="dogfood-ok"; fi
          ENTRY=$(node -e "
            console.log(JSON.stringify({
              run_id: '${END}',
              pattern: 'daily-triage',
              source: 'gha-dogfood',
              duration_s: Number('${DURATION}'),
              readiness_score: Number('${SCORE}'),
              readiness_level: '${LEVEL}',
              ci_status: '${CI_STATUS}',
              outcome: '${OUTCOME}',
              workflow_run: '${{ github.run_id }}',
              note: 'Scoreboard only — agent triage owns STATE.md'
            }));
          ")
          printf '\n```json\n%s\n```\n' "$ENTRY" >> loop-run-log.md
          echo "outcome=${OUTCOME}" >> "$GITHUB_OUTPUT"

      - name: Commit run-log only if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet loop-run-log.md; then
            echo "No run-log changes"
            exit 0
          fi
          BRANCH="automated/loop-dogfood-$(date -u +%Y-%m-%d)"
          git fetch origin main "refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}" 2>/dev/null || true
          git checkout -B "$BRANCH"
          git add loop-run-log.md
          git commit -m "chore(loop): dogfood scoreboard entry [automated]"
          git push -u origin "$BRANCH" --force
          EXISTING=$(gh pr list --head "${BRANCH}" --base main --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already open"
            exit 0
          fi
          BODY=$(printf '%s\n' \
            "## Loop dogfood (not agent triage)" \
            "" \
            "- Readiness: **${{ steps.audit.outputs.score }}** (${{ steps.audit.outputs.level }})" \
            "- CI: \`${{ steps.workflows.outputs.ci_status }}\`" \
            "- Real triage: Claude Code cron → \`scripts/loop-tick.sh\` (see LOOP.md)")
          gh pr create --base main --head "$BRANCH" --draft \
            --title "chore(loop): dogfood scoreboard $(date -u +%Y-%m-%d)" \
            --body "$BODY" || true

      - name: Open weekly loop-report issue (Mondays)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" != "1" ]; then echo "Not Monday — skip"; exit 0; fi
          EXISTING=$(gh issue list --label "loop-report" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Open loop-report issue #$EXISTING exists"
            exit 0
          fi
          gh label create "loop-report" --color "3ee8c5" --description "Weekly loop triage report" 2>/dev/null || true
          gh issue create \
            --title "Loop report — week of $(date -u +%Y-%m-%d)" \
            --label "loop-report" \
            --body "## Week check-in

          - Dogfood readiness: **${{ steps.audit.outputs.score }}** (${{ steps.audit.outputs.level }})
          - CI: \`${{ steps.workflows.outputs.ci_status }}\`
          - **Agent triage** owns \`STATE.md\` (GLM/MiniMax via \`scripts/loop-tick.sh\`). Cursor brain reviews.

          See \`LOOP.md\`."
