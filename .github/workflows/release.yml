name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    # GITHUB_TOKEN is auto-provided per run. `packages: write` is what
    # authorizes it to publish to GitHub Packages on this repo's behalf.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # This repo uses pnpm locally (pnpm-lock.yaml + per-package
      # node_modules under packages/*). Root `npm ci` would not install
      # workspace deps like ora used by packages/cli, so we use pnpm.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm-lock.yaml is lockfileVersion 9 (pnpm 9.x family).
          version: 9

      - name: Setup Node.js (with GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@angriff36'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Verify tag version matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Run test suite
        run: pnpm test -- --run

      - name: Publish to GitHub Packages
        # prepublishOnly already runs build:lib + cli build, so dist/ is
        # regenerated from current source before pack.
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
