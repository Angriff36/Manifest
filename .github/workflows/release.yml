name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  resolve:
    name: Resolve tag vs package version
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.versions.outputs.tag_version }}
      pkg_version: ${{ steps.versions.outputs.pkg_version }}
      should_publish: ${{ steps.versions.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - id: versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$TAG_VERSION" = "$PKG_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Tag matches package.json ($PKG_VERSION) — will publish to GitHub Packages"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$TAG_VERSION does not match package.json ($PKG_VERSION) — release notes only, skip publish"
          fi

  github-release:
    name: GitHub Release with changelog
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release notes from CHANGELOG.md
        run: |
          node .github/scripts/extract-changelog-section.mjs "${{ needs.resolve.outputs.tag_version }}" > release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "Install: \`npm install @angriff36/manifest@${{ needs.resolve.outputs.tag_version }}\` (GitHub Packages registry)." >> release-notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.resolve.outputs.tag_version }}
          body_path: release-notes.md
          generate_release_notes: false

  publish:
    name: Publish to GitHub Packages
    needs: resolve
    if: needs.resolve.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js (with GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@angriff36'
          cache: 'pnpm'

      - name: Install root dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install packages/cli dependencies (frozen lockfile)
        working-directory: packages/cli
        run: pnpm install --frozen-lockfile

      - name: Build root library
        run: pnpm run build:lib

      - name: Build CLI dist
        working-directory: packages/cli
        run: pnpm build

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Run test suite
        run: pnpm test -- --run

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
