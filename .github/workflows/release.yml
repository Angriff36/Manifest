name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    # GITHUB_TOKEN is auto-provided per run. `packages: write` is what
    # authorizes it to publish to GitHub Packages on this repo's behalf.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # This repo uses pnpm locally (pnpm-lock.yaml + per-package
      # node_modules under packages/*). Root `npm ci` would not install
      # workspace deps like ora used by packages/cli, so we use pnpm.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm-lock.yaml is lockfileVersion 9 (pnpm 9.x family).
          version: 9

      - name: Setup Node.js (with GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@angriff36'
          cache: 'pnpm'

      - name: Install root dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install packages/cli dependencies (frozen lockfile)
        # packages/cli is its own pnpm project (separate pnpm-lock.yaml),
        # not a workspace member of the root. Tests in root pull from
        # packages/cli/src/**, so its transitive deps (chalk, ora, ...) must
        # also be installed.
        working-directory: packages/cli
        run: pnpm install --frozen-lockfile

      - name: Verify tag version matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Build root library
        # packages/cli depends on @angriff36/manifest via type imports.
        # Without build:lib first, the CLI build and any test that touches
        # the published surface (enforce-surface.cli.test.ts spawns the
        # built CLI) fails to resolve modules.
        run: pnpm run build:lib

      - name: Build manifest-projection-prisma
        # The CLI's `register-extras.ts` imports `PrismaProjection` from
        # @manifest/projection-prisma. The CLI's tsconfig path-map points
        # at that package's own dist (../manifest-projection-prisma/dist/
        # index.d.ts). Without this build, the CLI build below fails with
        # TS2307. Order: projection-prisma's own tsc paths point at root
        # dist (../../dist/manifest/*), so build:lib must run first.
        working-directory: packages/manifest-projection-prisma
        run: pnpm run build

      - name: Build CLI dist
        working-directory: packages/cli
        run: pnpm build

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Run test suite
        run: pnpm test -- --run

      - name: Publish to GitHub Packages
        # prepublishOnly already runs build:lib + cli build, so dist/ is
        # regenerated from current source before pack. Using `pnpm publish`
        # rather than `npm publish` because the rest of this workflow runs
        # on pnpm, and `npm pack` (which `npm publish` calls internally)
        # has an intermittent @npmcli/arborist bug when walking pnpm-
        # managed node_modules — see packages/cli/src/checks/package-shape.ts
        # for the documented reproduction. `--no-git-checks` skips the
        # uncommitted-changes guard (Actions checkout is always clean).
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
