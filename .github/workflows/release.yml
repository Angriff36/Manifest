name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual re-run on an existing tag (Actions tab → Release → Run workflow →
  # pick the tag ref). Used to backfill GitHub Release pages when the notes
  # job failed; publish is idempotent (E409 → success), so this is safe.
  workflow_dispatch:

jobs:
  resolve:
    name: Resolve tag vs package version
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.versions.outputs.tag_version }}
      pkg_version: ${{ steps.versions.outputs.pkg_version }}
      should_publish: ${{ steps.versions.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v5

      - id: versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$TAG_VERSION" = "$PKG_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Tag matches package.json ($PKG_VERSION) — will publish to npm"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$TAG_VERSION does not match package.json ($PKG_VERSION) — release notes only, skip publish"
          fi

  github-release:
    name: GitHub Release with changelog
    needs: resolve
    # Only for tag refs — a workflow_dispatch from a branch must not create
    # a release object named after the branch.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Build release notes from CHANGELOG.md
        run: |
          VER="${{ needs.resolve.outputs.tag_version }}"
          # Prefer the CHANGELOG from main — sections are sometimes added after
          # the tag (v2.2.0 and v2.3.0 both shipped without one at the tagged
          # commit, which used to fail this job and kill the GitHub Release).
          git fetch --depth=1 origin main
          git show origin/main:CHANGELOG.md > CHANGELOG.main.md 2>/dev/null \
            && cp CHANGELOG.main.md CHANGELOG.md || true
          if ! node tools/release/extract-changelog-section.mjs "$VER" > release-notes.md; then
            echo "::warning::No CHANGELOG section for $VER — emitting fallback notes instead of failing."
            {
              echo "## $VER"
              echo ""
              echo "_No changelog section found for $VER. See CHANGELOG.md on main._"
            } > release-notes.md
          fi
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "Install: \`npm install @angriff36/manifest@$VER\`" >> release-notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.resolve.outputs.tag_version }}
          body_path: release-notes.md
          generate_release_notes: false

  publish:
    name: Publish to npm
    needs: resolve
    if: needs.resolve.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js (with npm registry)
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install root dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install packages/cli dependencies (frozen lockfile)
        working-directory: packages/cli
        run: pnpm install --frozen-lockfile

      - name: Build root library
        run: pnpm run build:lib

      - name: Build CLI dist
        working-directory: packages/cli
        run: pnpm build

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Run test suite
        run: pnpm test -- --run

      - name: Publish to npm
        run: |
          set +e
          out="$(pnpm publish --no-git-checks 2>&1)"
          code=$?
          echo "$out"
          if [ "$code" -ne 0 ]; then
            if printf '%s' "$out" | grep -qiE 'cannot publish over|E(PUBLISH)?CONFLICT|409 Conflict|code E409'; then
              echo "::notice::Version already published — treating as success (idempotent re-run)."
              exit 0
            fi
            exit "$code"
          fi
