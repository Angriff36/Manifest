name: Cut Release

# Standard one-button npm release using OIDC trusted publishing
# (no NPM_TOKEN, no GitHub Packages). Run from the Actions tab or:
#   gh workflow run cut-release.yml -f version=patch    (or minor / major / explicit e.g. 2.19.0)
#
# Publish-first: npm is the source of truth for "released", so the version
# commit + tag are pushed ONLY after `pnpm publish` succeeds. A publish
# failure leaves npm and git untouched — no dangling tags, no half-released
# versions. package.json is the version source of truth (checkout always
# sees latest main, so no tag-aligning drift hack is needed).
#
# One-time prerequisite: register the trusted publisher once via
# scripts/setup-npm-trusted-publish.ps1 (links this workflow to npm via OIDC).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version (e.g. 2.19.0) or bump: patch | minor | major'
        required: true
        default: 'patch'

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # push version commit + tag, create the GitHub Release
      id-token: write     # OIDC trusted publishing to npm (no NPM_TOKEN)
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js (npm registry)
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # package.json is the source of truth. checkout@v5 ref:main always sees
      # the latest [release] commit, so a plain `npm version` bump is correct.
      - name: Bump version
        id: ver
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version --ignore-scripts
          node scripts/sync-version.mjs
          VER=$(node -p "require('./package.json').version")
          if git rev-parse -q --verify "refs/tags/v$VER" >/dev/null; then
            echo "::error::Tag v$VER already exists — refusing to re-release."
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Cutting release v$VER"

      - name: Ensure CHANGELOG section
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            git log "$LAST_TAG"..HEAD --no-merges --pretty='- %s' > /tmp/commits.txt
          else
            : > /tmp/commits.txt
          fi
          node tools/release/ensure-changelog-section.mjs "${{ steps.ver.outputs.version }}" /tmp/commits.txt

      - name: Install root dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install packages/cli dependencies (frozen lockfile)
        working-directory: packages/cli
        run: pnpm install --frozen-lockfile

      - name: Build root library
        run: pnpm run build:lib

      - name: Build CLI dist
        working-directory: packages/cli
        run: pnpm build

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Run test suite
        run: pnpm test -- --run

      # Commit the bump locally. NOT pushed yet — see publish step below.
      - name: Commit version bump
        run: |
          VER="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src/manifest/version.ts CHANGELOG.md
          git commit -m "[release] v$VER"

      # Publish FIRST. If this fails, we exit and nothing is pushed — no tag,
      # no GitHub Release, npm unchanged. Re-runs are idempotent (a 409 "already
      # published" is treated as success so the tag/release step still completes).
      - name: Publish to npm (OIDC)
        run: |
          set +e
          # pnpm signs provenance but does NOT perform the trusted-publishing
          # credential exchange — only the npm CLI does. Pack with pnpm (it
          # handles this workspace layout), then publish the tarball with the
          # npm CLI + --provenance, which performs the OIDC exchange and dodges
          # npm's Arborist/workspace errors on a directory publish.
          pnpm pack --pack-destination "$RUNNER_TEMP" >/tmp/pack.log 2>&1
          TARBALL="$(ls -t "$RUNNER_TEMP"/*@*.tgz | head -n1)"
          echo "Publishing $TARBALL"
          out="$(npm publish "$TARBALL" --provenance --access public 2>&1)"
          code=$?
          echo "$out"
          if [ "$code" -ne 0 ]; then
            if printf '%s' "$out" | grep -qiE 'cannot publish over|E(PUBLISH)?CONFLICT|409 Conflict|code E409'; then
              echo "::notice::Version already published — treating as success (idempotent re-run)."
              exit 0
            fi
            exit "$code"
          fi

      # Only after a successful publish: tag, push, and release.
      - name: Tag, push, and create GitHub Release
        run: |
          VER="${{ steps.ver.outputs.version }}"
          git tag -a "v$VER" -m "v$VER"
          git push origin main
          git push origin "v$VER"
          node tools/release/extract-changelog-section.mjs "$VER" > release-notes.md
          {
            echo ""
            echo "---"
            echo ""
            echo "Install: \`npm install @angriff36/manifest@$VER\`"
          } >> release-notes.md
          gh release create "v$VER" --title "v$VER" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
