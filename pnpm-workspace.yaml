# pnpm workspace declaration.
#
# Pre-Phase-3, this repo had two pnpm projects (root + packages/cli) with
# their own lockfiles and no workspace file. The CLI's `workspace:*` dep on
# `@angriff36/manifest` resolved by pnpm's parent-directory-traversal
# heuristic (looking up from packages/cli/ to the root package.json).
#
# Phase 3 added a SIBLING workspace package (packages/manifest-projection-prisma)
# whose package.json depends on `@angriff36/manifest: workspace:*`. Sibling
# discovery requires an explicit workspace declaration; pnpm's parent-traversal
# heuristic does not find siblings.
#
# We list only the projection-prisma package here, NOT packages/cli, because
# the CLI has its own pnpm-lock.yaml and the release workflow installs its
# deps as a separate `pnpm install --frozen-lockfile` step. Pulling the CLI
# into the workspace would invalidate that lockfile and the workflow.
packages:
  - 'packages/manifest-projection-prisma'
